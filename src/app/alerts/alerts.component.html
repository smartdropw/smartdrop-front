<div class="alerts-page">
  <div class="page-header">
    <h1>Alerts &amp; Notifications</h1>
    <p>Monitor and manage your water system alerts and notification preferences</p>
  </div>

  <!-- STATS -->
  <div class="stats-grid">
    <div class="stat-card" *ngFor="let s of stats" [ngClass]="'stat--' + s.color">
      <div class="stat-left">
        <p class="stat-label">{{ s.label }}</p>
        <p class="stat-value">{{ s.value }}</p>
      </div>
      <div class="stat-icon">
        <ng-container [ngSwitch]="s.icon">
          <svg *ngSwitchCase="'triangle'" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/></svg>
          <svg *ngSwitchCase="'clock'" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          <svg *ngSwitchCase="'info'" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          <svg *ngSwitchCase="'check'" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
        </ng-container>
      </div>
    </div>
  </div>

  <!-- MAIN AREA -->
  <div class="content-row">
    <!-- ACTIVE ALERTS -->
    <div class="card alerts-list-card">
      <h3>Active Alerts</h3>
      <div class="alerts-list">
        <div class="alert-item" *ngFor="let a of alerts; let i = index" [ngClass]="'alert--' + a.type">
          <div class="alert-icon">
            <svg *ngIf="a.type === 'critical'" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/></svg>
            <svg *ngIf="a.type === 'warning'" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#f59e0b" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            <svg *ngIf="a.type === 'info'" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          </div>
          <div class="alert-body">
            <p class="alert-title">{{ a.title }}</p>
            <p class="alert-desc">{{ a.desc }}</p>
            <span class="alert-time">{{ a.time }}</span>
          </div>
          <button class="alert-close" (click)="removeAlert(i)">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
        <div class="no-alerts" *ngIf="alerts.length === 0">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
          <p>All clear! No active alerts.</p>
        </div>
      </div>
    </div>

    <!-- NOTIFICATION SETTINGS -->
    <div class="card settings-card">
      <h3>Notification Settings</h3>

      <div class="settings-group">
        <p class="settings-label">Alert Types</p>
        <label class="toggle-row">
          <input type="checkbox" [(ngModel)]="settings.criticalAlerts"> Critical Alerts
        </label>
        <label class="toggle-row">
          <input type="checkbox" [(ngModel)]="settings.usageWarnings"> Usage Warnings
        </label>
        <label class="toggle-row">
          <input type="checkbox" [(ngModel)]="settings.maintenanceReminders"> Maintenance Reminders
        </label>
      </div>

      <div class="settings-group">
        <p class="settings-label">Delivery Methods</p>
        <label class="toggle-row">
          <input type="checkbox" [(ngModel)]="settings.pushNotifications"> Push Notifications
        </label>
        <label class="toggle-row">
          <input type="checkbox" [(ngModel)]="settings.email"> Email
        </label>
        <label class="toggle-row">
          <input type="checkbox" [(ngModel)]="settings.sms"> SMS
        </label>
      </div>

      <button class="btn-primary full">Save Settings</button>
    </div>
  </div>
</div>
