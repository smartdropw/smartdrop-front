<div class="reports-page">
  <div class="page-header">
    <h1>Reports &amp; Analytics</h1>
    <p>Comprehensive water usage analytics and detailed reporting</p>
  </div>

  <!-- FILTERS -->
  <div class="card filters-card">
    <div class="filters-row">
      <div class="filter-group">
        <label>Time Period</label>
        <select [(ngModel)]="timePeriod">
          <option>Last 7 Days</option>
          <option>Last 30 Days</option>
          <option>Last 3 Months</option>
          <option>This Year</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Report Type</label>
        <select [(ngModel)]="reportType">
          <option>Usage Analytics</option>
          <option>Cost Analysis</option>
          <option>Efficiency Report</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Location</label>
        <select [(ngModel)]="location">
          <option>All Locations</option>
          <option>Kitchen</option>
          <option>Bathroom</option>
          <option>Garden</option>
        </select>
      </div>
      <button class="btn-primary">Generate Report</button>
    </div>
  </div>

  <!-- CHARTS -->
  <div class="charts-row">
    <div class="card chart-card">
      <h3>Water Usage Trends</h3>
      <div class="chart-wrap">
        <canvas #trendCanvas class="chart-canvas"></canvas>
      </div>
    </div>
    <div class="card chart-card">
      <h3>Cost Breakdown</h3>
      <div class="chart-wrap">
        <canvas #costCanvas class="chart-canvas"></canvas>
      </div>
    </div>
  </div>

  <!-- BOTTOM -->
  <div class="bottom-row">
    <!-- EFFICIENCY -->
    <div class="card efficiency-card">
      <h3>Efficiency Metrics</h3>
      <div class="eff-score-row">
        <span>Water Efficiency Score</span>
        <span class="eff-pct">{{ efficiencyScore }}%</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" [style.width.%]="efficiencyScore"></div>
      </div>
      <div class="eff-stats">
        <div class="eff-stat">
          <p class="eff-stat-value">2,340L</p>
          <p class="eff-stat-label">Water Saved</p>
        </div>
        <div class="eff-stat">
          <p class="eff-stat-value">$156</p>
          <p class="eff-stat-label">Cost Saved</p>
        </div>
      </div>
    </div>

    <!-- RECENT REPORTS -->
    <div class="card recent-reports-card">
      <h3>Recent Reports</h3>
      <div class="report-list">
        <div class="report-item" *ngFor="let r of recentReports">
          <div class="report-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          </div>
          <div class="report-info">
            <p class="report-name">{{ r.name }}</p>
            <p class="report-date">{{ r.date }}</p>
          </div>
          <button class="dl-btn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
