<div class="split-screen">
  <div class="left-panel">
    <div class="brand-info">
      <h2>SmartDrop</h2>
      <span class="tagline">Identity Management</span>
      <h1>New Password</h1>
      <p>Please enter your new password to regain access to your dashboard.</p>
    </div>
  </div>

  <div class="right-panel">
    <div class="lang-selector">
      <i class="feather icon-globe"></i>
      <button>ES</button>
    </div>

    <div class="login-box">
      <h2 class="login-title">Reset Password</h2>
      <p class="login-subtitle">Choose a strong password to protect your account.</p>

      <div class="action-message error" *ngIf="message">{{ message }}</div>

      <div class="input-group">
        <label>New Password</label>
        <div class="input-wrapper">
          <i class="feather icon-lock field-icon"></i>
          <input [type]="showPassword ? 'text' : 'password'" placeholder="Enter new password" [(ngModel)]="password">
          <i class="feather eye-icon" [ngClass]="showPassword ? 'icon-eye-off' : 'icon-eye'" (click)="showPassword = !showPassword"></i>
        </div>
      </div>
      
      <div class="input-group">
        <label>Confirm Password</label>
        <div class="input-wrapper">
          <i class="feather icon-lock field-icon"></i>
          <input [type]="showPassword ? 'text' : 'password'" placeholder="Confirm new password" [(ngModel)]="confirmPassword">
        </div>
      </div>

      <button class="btn-primary" (click)="updatePassword()">
        Update Password <i class="feather icon-check"></i>
      </button>
    </div>
  </div>
</div>
