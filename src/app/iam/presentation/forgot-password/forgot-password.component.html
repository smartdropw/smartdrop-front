<div class="split-screen">
  <div class="left-panel">
    <div class="brand-info">
      <h2>SmartDrop</h2>
      <span class="tagline">Identity Management</span>
      <h1>Recover Access</h1>
      <p>Securely regain control of your account to continue monitoring your water systems.</p>
    </div>
  </div>

  <div class="right-panel">
    <div class="lang-selector">
      <i class="feather icon-globe"></i>
      <button>ES</button>
    </div>

    <div class="login-box">
      <div class="register-link">
        Remembered your password? <a routerLink="/login">Back to Login</a>
      </div>

      <h2 class="login-title">Forgot Password</h2>
      <p class="login-subtitle">Enter your registered email address to receive a recovery link.</p>

      <div class="action-message" *ngIf="message">{{ message }}</div>

      <div class="input-group">
        <label>Email Address</label>
        <div class="input-wrapper">
          <i class="feather icon-mail field-icon"></i>
          <input type="email" placeholder="you@example.com" [(ngModel)]="email">
        </div>
      </div>

      <button class="btn-primary" (click)="sendRecoveryLink()">
        Send Recovery Link <i class="feather icon-arrow-right"></i>
      </button>
    </div>
  </div>
</div>
