<div class="split-screen">
  <div class="left-panel">
    <div class="brand-info">
      <h2>SmartDrop</h2>
      <span class="tagline">Identity Management</span>
      <h1>Two-Step Verification</h1>
      <p>Enter the 6-digit code from your authenticator app to continue.</p>
    </div>
  </div>

  <div class="right-panel">
    <div class="lang-selector">
      <i class="feather icon-globe"></i>
      <button>ES</button>
    </div>

    <div class="login-box">
      <h2 class="login-title">Verify Identity</h2>
      <p class="login-subtitle">Protecting your account is our top priority.</p>

      <div class="action-message error" *ngIf="message">{{ message }}</div>

      <div class="input-group">
        <label>Verification Code</label>
        <div class="input-wrapper">
          <i class="feather icon-shield field-icon"></i>
          <input type="text" placeholder="000000" maxlength="6" [(ngModel)]="code" (keyup.enter)="verifyCode()">
        </div>
      </div>

      <button class="btn-primary" (click)="verifyCode()">
        Verify Code <i class="feather icon-check"></i>
      </button>

      <div class="divider"><span>OR</span></div>
      
      <div class="register-link" style="text-align:center;">
        <a routerLink="/login">Back to Login</a>
      </div>
    </div>
  </div>
</div>
