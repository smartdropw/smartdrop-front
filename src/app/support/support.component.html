<div class="support-page">
  <div class="page-header">
    <h1>Support &amp; Help</h1>
    <p>Create tickets and manage your support requests</p>
  </div>

  <div class="content-row">
    <!-- CREATE TICKET -->
    <div class="card">
      <h3>Create support ticket</h3>
      <div class="form-group">
        <label>Subject</label>
        <input type="text" placeholder="Small title for your ticket" [(ngModel)]="ticket.subject">
      </div>
      <div class="form-group">
        <label>Priority</label>
        <select [(ngModel)]="ticket.priority">
          <option value="" disabled>Select a Priority</option>
          <option>Low</option>
          <option>Medium</option>
          <option>High</option>
          <option>Critical</option>
        </select>
      </div>
      <div class="form-group">
        <label>Description</label>
        <textarea placeholder="Explain your problem, detail as much as needed" [(ngModel)]="ticket.description" rows="4"></textarea>
      </div>
      <button class="btn-primary full" (click)="submitTicket()">Send</button>
    </div>

    <!-- RIGHT SIDE -->
    <div class="right-col">
      <!-- RECENT TICKETS -->
      <div class="card">
        <h3>Recent tickets</h3>
        <div class="ticket-list">
          <div class="ticket-item" *ngFor="let t of tickets" [ngClass]="'ticket--' + t.status">
            <div class="ticket-info">
              <p class="ticket-cat">{{ t.category }}</p>
              <p class="ticket-id">ticket {{ t.id }}</p>
            </div>
            <span class="ticket-badge" [ngClass]="'badge--' + t.status">{{ t.status }}</span>
          </div>
        </div>
      </div>

      <!-- CONTACT -->
      <div class="card contact-card">
        <h3>Contact us</h3>
        <div class="contact-links">
          <a class="contact-link" href="https://wa.me/51999999999" target="_blank">
            <div class="contact-icon whatsapp">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="#25D366"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12.004 2C6.477 2 2 6.477 2 12c0 1.99.574 3.844 1.567 5.408L2 22l4.703-1.542A9.956 9.956 0 0 0 12.004 22C17.528 22 22 17.523 22 12S17.528 2 12.004 2zm0 18.188a8.146 8.146 0 0 1-4.162-1.138l-.299-.178-3.086 1.012 1.038-3.003-.195-.308A8.19 8.19 0 0 1 3.814 12c0-4.52 3.675-8.194 8.19-8.194 4.516 0 8.19 3.674 8.19 8.194 0 4.52-3.674 8.188-8.19 8.188z"/></svg>
            </div>
            <div>
              <p class="contact-label">WhatsApp Chat</p>
              <p class="contact-link-text">Link</p>
            </div>
          </a>
          <a class="contact-link" href="mailto:support@smartdrop.io">
            <div class="contact-icon email">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#f59e0b" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
            </div>
            <div>
              <p class="contact-label">E-mail</p>
              <p class="contact-link-text">Link</p>
            </div>
          </a>
        </div>
      </div>
    </div>
  </div>
</div>
